<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keren's Solar System</title>
    <script src="script/aframe.min.js"></script>
</head>
<body>
    <a-scene>   

        <!--Asset Management--> 
        <a-assets>
            <img id="sun" src="texture/2k_sun.jpg" alt="">
            <img id="earth" src="texture/2k_earth_daymap.jpg" alt="">
            <img id="moon" src="texture/2k_moon.jpg" alt="">
            <img id="mars" src="texture/2k_mars.jpg" alt="">
            <img id="stars" src="texture/2k_stars.jpg" alt="">  
            <img id="milky_way" src="texture/2k_milky_way.jpg" alt="">
            <img id="venus_surface" src="texture/2k_venus_surface.jpg" alt=""> 
            <img id="venus_atmosphere" src="texture/2k_venus_atmosphere.jpg" alt="">
            <img id="mercury.jpg"   src = "texture/2k_mercury.jpg" alt="">
            <img id="jupiter.jpg"   src = "texture/2k_jupiter.jpg" alt="">
            <img id="saturn.jpg"    src = "texture/2k_saturn.jpg" alt="">
            <img id="saturn_ring"  src="texture/2k_saturn_ring_alpha.png" alt="">   
            <img id="uranus.jpg"    src = "texture/2k_uranus.jpg" alt="">
            <img id="neptune.jpg"   src = "texture/2k_neptune.jpg" alt="">  



        </a-assets>

        <!-- Sky-box - Milky Way -->
        <a-sky src="#milky_way" rotation="0 -90 0"></a-sky>


    
    </a-scene>
</body>
</html>
